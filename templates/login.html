<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Harrow School LMS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-box">
    <div class="auth-crest">
      <div class="crest-icon">◇</div>
      <h1>Harrow School</h1>
      <p>Library Management System</p>
    </div>

    <h2>Sign in to your account</h2>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <hr class="auth-divider">
    <p style="font-size:0.85rem;text-align:center;color:var(--color-text-secondary);">
      New here? <a href="/register" style="color:var(--color-primary);font-weight:600;text-decoration:none;">Create an account</a>
    </p>
    <hr class="auth-divider">
    <div class="demo-note">
      <strong>Demo access:</strong><br>
      Username: <code>admin</code> &nbsp;/&nbsp; Password: <code>admin123</code>
    </div>
  </div>
</div>

</body>
</html>
