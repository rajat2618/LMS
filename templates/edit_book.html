{% extends "layout.html" %}

{% block title %}Edit Book - Library Management System{% endblock %}

{% block content %}

<div class="section-header">
    <h1>✏️ Edit Book</h1>
    <p class="subtitle">Book ID: {{ book.id }}</p>
</div>

<div class="form-container" style="max-width: 600px;">
    <div class="card">
        <form method="POST" class="edit-form">
            <div class="form-group">
                <label for="title">📚 Book Title</label>
                <input type="text" id="title" name="title" value="{{ book.title }}" 
                       placeholder="Enter book title" required>
            </div>

            <div class="form-group">
                <label for="author">✍️ Author</label>
                <input type="text" id="author" name="author" value="{{ book.author }}" 
                       placeholder="Enter author name" required>
            </div>

            <div class="form-group">
                <label for="isbn">📱 ISBN</label>
                <input type="text" id="isbn" name="isbn" value="{{ book.isbn or '' }}" 
                       placeholder="Enter ISBN (optional)">
            </div>

            <div class="form-group">
                <label>📊 Total Copies</label>
                <p style="padding: 10px; background: #f0f0f0; border-radius: 5px;">
                    <strong>{{ book.total_copies }}</strong> (Cannot be changed)
                </p>
            </div>

            <div class="form-group">
                <label>✅ Available Copies</label>
                <p style="padding: 10px; background: #f0f0f0; border-radius: 5px;">
                    <strong>{{ book.available_copies }}</strong> (Cannot be changed)
                </p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    ✅ Update Book
                </button>
                <a href="/admin" class="btn btn-secondary">
                    ⬅️ Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
